<svg viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg">

  <g id="wrapper">
    <animateTransform attributeName="transform" type="translate"
      values="-80,85;880,85"
      dur="11s" repeatCount="indefinite"/>

    <g id="float">
      <animateTransform attributeName="transform" type="translate"
        values="0,0;0,-7;0,0;0,6;0,0" keyTimes="0;0.25;0.5;0.75;1"
        dur="2.6s" repeatCount="indefinite"/>

      <g id="wobble">
        <animateTransform attributeName="transform" type="rotate"
          values="-4;4;-4" dur="3.2s" repeatCount="indefinite"/>

        <!-- tiny sparkles floating near the astronaut -->
        <g fill="#ffffff">
          <circle cx="-58" cy="-30" r="1.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" repeatCount="indefinite"/></circle>
          <circle cx="55" cy="20" r="1.3"><animate attributeName="opacity" values="1;0.2;1" dur="2.1s" repeatCount="indefinite"/></circle>
          <circle cx="-50" cy="18" r="1.2"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.6s" repeatCount="indefinite"/></circle>
        </g>

        <!-- backpack -->
        <rect x="-34" y="-14" width="13" height="27" rx="4" fill="#d8dbe0"/>
        <circle cx="-27" cy="-6" r="2" fill="#f2665c">
          <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite"/>
        </circle>

        <!-- tail poking through the suit, drifting -->
        <g transform="translate(-20,10)">
          <g>
            <animateTransform attributeName="transform" type="rotate" values="-15 0 0;20 0 0;-15 0 0" dur="2.4s" repeatCount="indefinite"/>
            <path d="M0,0 C-10,4 -16,14 -10,24 C-7,29 -1,30 2,27 C-2,22 -4,14 0,6 Z" fill="#eb9c5e"/>
          </g>
        </g>

        <!-- back leg, loose float paddle -->
        <g transform="translate(-10,16)">
          <g>
            <animateTransform attributeName="transform" type="rotate" values="10 0 0;-14 0 0;10 0 0" dur="2.2s" repeatCount="indefinite"/>
            <path d="M0,0 C-2,7 -2,14 0,20 L9,20 C10,13 9,6 6,0 Z" fill="#e7e9ec"/>
            <path d="M-1,18 L10,18 L10,24 C6,26 0,26 -2,24 Z" fill="#c94f3c"/>
          </g>
        </g>

        <!-- suit body -->
        <path d="M-26,4 C-30,-16 -8,-27 12,-22 C28,-18 34,-4 30,10
                 C28,22 12,28 -8,26 C-24,25 -25,14 -26,4 Z" fill="#eef0f3"/>
        <!-- chest panel -->
        <rect x="-10" y="-2" width="16" height="12" rx="2" fill="#c7ccd3"/>
        <circle cx="-5" cy="4" r="2" fill="#5cc17a"/>
        <circle cx="1" cy="4" r="2" fill="#e8b23d"/>
        <path d="M-16,-14 C-4,-19 8,-19 20,-14" stroke="#e8935a" stroke-width="4" fill="none" stroke-linecap="round"/>

        <!-- front leg, loose float paddle -->
        <g transform="translate(14,18)">
          <g>
            <animateTransform attributeName="transform" type="rotate" values="-12 0 0;16 0 0;-12 0 0" dur="2.2s" begin="-1.1s" repeatCount="indefinite"/>
            <path d="M0,0 C2,7 2,14 0,20 L-9,20 C-10,13 -9,6 -6,0 Z" fill="#e7e9ec"/>
            <path d="M1,18 L-10,18 L-10,24 C-6,26 0,26 2,24 Z" fill="#c94f3c"/>
          </g>
        </g>

        <!-- resting arm -->
        <g transform="translate(-24,-4)">
          <g>
            <animateTransform attributeName="transform" type="rotate" values="8 0 0;-6 0 0;8 0 0" dur="2.6s" repeatCount="indefinite"/>
            <path d="M0,0 C-8,2 -14,8 -13,15 C-13,18 -8,19 -6,16 C-7,10 -3,5 2,2 Z" fill="#eef0f3"/>
            <circle cx="-13" cy="16" r="4.5" fill="#e7e9ec"/>
          </g>
        </g>

        <!-- lasso arm + twirling rope -->
        <g transform="translate(26,-6)">
          <path d="M0,0 C9,-1 16,3 18,10 C19,14 15,17 12,15 C11,10 7,5 0,3 Z" fill="#eef0f3"/>
          <circle cx="18" cy="12" r="4.5" fill="#e7e9ec"/>

          <g transform="translate(18,12)">
            <g>
              <animateTransform attributeName="transform" type="rotate" values="0;360" dur="0.55s" repeatCount="indefinite"/>
              <path d="M0,0 C4,-6 10,-10 16,-6" stroke="#c9973f" stroke-width="1.6" fill="none" stroke-linecap="round"/>
              <circle cx="18" cy="-9" r="9" fill="none" stroke="#c9973f" stroke-width="2.2"/>
            </g>
          </g>
        </g>

        <!-- helmet + face -->
        <g transform="translate(9,-32)">
          <!-- ears peeking over the dome -->
          <path d="M-11,-2 C-13,-9 -11,-14 -6,-13 C-7,-9 -8,-4 -8,0 Z" fill="#eb9c5e"/>
          <path d="M9,-3 C12,-10 11,-15 6,-13 C7,-9 8,-4 8,0 Z" fill="#eb9c5e"/>

          <circle cx="0" cy="0" r="20" fill="#bfe3ef" opacity="0.5"/>
          <circle cx="0" cy="0" r="20" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.9"/>
          <path d="M-13,-13 C-9,-16 -3,-17 2,-16" stroke="#ffffff" stroke-width="2" opacity="0.7" fill="none" stroke-linecap="round"/>

          <!-- cat face -->
          <circle cx="-5" cy="1" r="2" fill="#2a1d16"/>
          <circle cx="6" cy="0.5" r="2" fill="#2a1d16"/>
          <circle cx="-4.3" cy="0.4" r="0.6" fill="#fff"/>
          <circle cx="6.7" cy="-0.1" r="0.6" fill="#fff"/>
          <path d="M0,5 L3.5,5 L1.7,7.5 Z" fill="#e8748a"/>
          <path d="M1.7,7.5 C1.7,9.5 -0.5,10.5 -3,10" stroke="#3a2a20" stroke-width="1" fill="none" stroke-linecap="round"/>
          <path d="M1.7,7.5 C1.7,9.5 3.9,10.5 6.4,10" stroke="#3a2a20" stroke-width="1" fill="none" stroke-linecap="round"/>
          <path d="M-6,4 C-10,3 -13,3 -16,4" stroke="#ffffff" stroke-width="0.8" opacity="0.6"/>
          <path d="M7,3.5 C11,2.5 14,2.5 17,3.5" stroke="#ffffff" stroke-width="0.8" opacity="0.6"/>
        </g>

      </g>
    </g>
  </g>
</svg>
