<svg viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg">

  <g id="catWrapper">
    <animateTransform attributeName="transform" type="translate"
      values="-70,110;870,110"
      dur="8s" repeatCount="indefinite"/>

    <!-- soft contact shadow -->
    <ellipse cx="0" cy="34" rx="46" ry="7" fill="#000000" opacity="0.18">
      <animate attributeName="rx" values="46;40;46" dur="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.18;0.1;0.18" dur="0.5s" repeatCount="indefinite"/>
    </ellipse>

    <g id="catBob">
      <animateTransform attributeName="transform" type="translate"
        values="0,0;0,-3.5;0,0" keyTimes="0;0.5;1"
        dur="0.5s" repeatCount="indefinite"/>

      <!-- ============ BACK FAR LEG ============ -->
      <g transform="translate(-24,16)">
        <g>
          <animateTransform attributeName="transform" type="rotate"
            values="18 0 0;-18 0 0;18 0 0" keyTimes="0;0.5;1"
            dur="0.5s" begin="-0.25s" repeatCount="indefinite"/>
          <path d="M-4,0 C-5,8 -5,14 -4,20 C-2,22 4,22 6,20 C7,14 6,8 5,0 Z" fill="#d98a4a"/>
          <ellipse cx="1" cy="21" rx="5.5" ry="3.5" fill="#fbe3c8"/>
        </g>
      </g>

      <!-- ============ FRONT FAR LEG ============ -->
      <g transform="translate(28,16)">
        <g>
          <animateTransform attributeName="transform" type="rotate"
            values="-18 0 0;18 0 0;-18 0 0" keyTimes="0;0.5;1"
            dur="0.5s" begin="-0.25s" repeatCount="indefinite"/>
          <path d="M-4,0 C-5,8 -5,14 -4,20 C-2,22 4,22 6,20 C7,14 6,8 5,0 Z" fill="#d98a4a"/>
          <ellipse cx="1" cy="21" rx="5.5" ry="3.5" fill="#fbe3c8"/>
        </g>
      </g>

      <!-- ============ TAIL ============ -->
      <g transform="translate(-42,-6)">
        <g>
          <animateTransform attributeName="transform" type="rotate"
            values="-10 0 0;14 0 0;-10 0 0" dur="1.1s" repeatCount="indefinite"/>
          <path d="M0,4 C-14,-4 -24,-18 -18,-34 C-15,-40 -8,-42 -6,-38
                   C-10,-30 -14,-20 -8,-10 C-3,-2 4,2 8,4 C6,8 2,7 0,4 Z"
                fill="#eb9c5e"/>
          <path d="M-16,-33 C-14,-38 -9,-40 -6,-38 C-9,-36 -13,-33 -16,-33 Z" fill="#3a2a20"/>
        </g>
      </g>

      <!-- ============ BODY ============ -->
      <path d="M-46,10 C-51,-14 -22,-29 4,-25 C27,-22 43,-13 44,6
               C46,22 30,29 -1,27 C-27,29 -43,26 -46,10 Z" fill="#eb9c5e"/>
      <!-- belly patch -->
      <path d="M-30,6 C-30,18 -14,24 2,23 C16,23 26,17 24,8
               C10,16 -16,16 -30,6 Z" fill="#fbe3c8"/>
      <!-- back stripes -->
      <path d="M-24,-18 C-22,-8 -22,2 -24,12" stroke="#c97a3d" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M-4,-24 C-2,-10 -2,4 -4,18" stroke="#c97a3d" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M16,-21 C18,-9 18,3 16,15" stroke="#c97a3d" stroke-width="4" fill="none" stroke-linecap="round"/>

      <!-- ============ HEAD ============ -->
      <g transform="translate(52,-19)">
        <!-- ears -->
        <g>
          <animateTransform attributeName="transform" type="rotate" values="0;-4;0;3;0" keyTimes="0;0.3;0.5;0.8;1" dur="3.4s" repeatCount="indefinite"/>
          <path d="M-15,-10 C-19,-20 -22,-28 -18,-31 C-13,-27 -8,-19 -6,-13 Z" fill="#eb9c5e"/>
          <path d="M-14,-14 C-16,-20 -18,-25 -16,-27 C-13,-24 -10,-19 -9,-15 Z" fill="#f9c9c9"/>
        </g>
        <g>
          <animateTransform attributeName="transform" type="rotate" values="0;3;0;-4;0" keyTimes="0;0.3;0.5;0.8;1" dur="3.4s" repeatCount="indefinite"/>
          <path d="M7,-14 C10,-24 14,-31 19,-29 C18,-22 14,-15 10,-10 Z" fill="#eb9c5e"/>
          <path d="M8,-16 C10,-23 13,-27 16,-26 C15,-21 12,-16 10,-13 Z" fill="#f9c9c9"/>
        </g>

        <!-- head shape with cheeks -->
        <path d="M-17,-3 C-19,-14 -10,-21 1,-21 C13,-21 21,-13 20,-2
                 C22,5 18,12 10,14 C4,17 -4,17 -10,14 C-18,12 -20,4 -17,-3 Z"
              fill="#eb9c5e"/>

        <!-- eyes with blink -->
        <g>
          <animate attributeName="opacity" values="1;1;0.05;1;1" keyTimes="0;0.46;0.5;0.54;1" dur="4s" repeatCount="indefinite"/>
          <path d="M-9,-4 C-7,-6.5 -3,-6.5 -1,-4 C-3,-2.5 -7,-2.5 -9,-4 Z" fill="#2a1d16"/>
          <path d="M4,-4.5 C6,-7 10,-7 12,-4.5 C10,-3 6,-3 4,-4.5 Z" fill="#2a1d16"/>
          <circle cx="-4.2" cy="-4.6" r="0.7" fill="#fff"/>
          <circle cx="8.8" cy="-5.1" r="0.7" fill="#fff"/>
        </g>

        <!-- nose + mouth -->
        <path d="M0,3 L4.5,3 L2.2,6.2 Z" fill="#e8748a"/>
        <path d="M2.2,6.2 C2.2,8.5 0,10 -3,9.5" stroke="#3a2a20" stroke-width="1.1" fill="none" stroke-linecap="round"/>
        <path d="M2.2,6.2 C2.2,8.5 4.4,10 7.4,9.5" stroke="#3a2a20" stroke-width="1.1" fill="none" stroke-linecap="round"/>

        <!-- whiskers -->
        <path d="M6,4 C13,2 19,1 24,0" stroke="#ffffff" stroke-width="1" opacity="0.75" fill="none"/>
        <path d="M6,7 C13,7 19,8.5 24,10" stroke="#ffffff" stroke-width="1" opacity="0.75" fill="none"/>
        <path d="M-5,4 C-12,2 -18,1 -23,0" stroke="#ffffff" stroke-width="1" opacity="0.75" fill="none"/>
        <path d="M-5,7 C-12,7 -18,8.5 -23,10" stroke="#ffffff" stroke-width="1" opacity="0.75" fill="none"/>
      </g>

      <!-- ============ BACK NEAR LEG ============ -->
      <g transform="translate(-24,16)">
        <g>
          <animateTransform attributeName="transform" type="rotate"
            values="-18 0 0;18 0 0;-18 0 0" keyTimes="0;0.5;1"
            dur="0.5s" repeatCount="indefinite"/>
          <path d="M-4,0 C-5,8 -5,14 -4,20 C-2,22 4,22 6,20 C7,14 6,8 5,0 Z" fill="#eb9c5e"/>
          <ellipse cx="1" cy="21" rx="5.5" ry="3.5" fill="#fff6ea"/>
        </g>
      </g>

      <!-- ============ FRONT NEAR LEG ============ -->
      <g transform="translate(28,16)">
        <g>
          <animateTransform attributeName="transform" type="rotate"
            values="18 0 0;-18 0 0;18 0 0" keyTimes="0;0.5;1"
            dur="0.5s" repeatCount="indefinite"/>
          <path d="M-4,0 C-5,8 -5,14 -4,20 C-2,22 4,22 6,20 C7,14 6,8 5,0 Z" fill="#eb9c5e"/>
          <ellipse cx="1" cy="21" rx="5.5" ry="3.5" fill="#fff6ea"/>
        </g>
      </g>

    </g>
  </g>
</svg>
