<svg viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg">

  <g id="wrapper">
    <animateTransform attributeName="transform" type="translate"
      values="-80,100;880,100"
      dur="6s" repeatCount="indefinite"/>

    <g id="bounce">
      <animateTransform attributeName="transform" type="translate"
        values="0,0;0,-2.5;0,0;0,-1;0" keyTimes="0;0.25;0.5;0.75;1"
        dur="0.4s" repeatCount="indefinite"/>

      <!-- ===== speed lines ===== -->
      <g stroke="#c9c9c9" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
        <path d="M-70,-6 L-92,-6">
          <animate attributeName="opacity" values="0.8;0;0.8" dur="0.35s" repeatCount="indefinite"/>
        </path>
        <path d="M-66,4 L-98,4">
          <animate attributeName="opacity" values="0;0.8;0" dur="0.35s" begin="0.1s" repeatCount="indefinite"/>
        </path>
        <path d="M-72,14 L-90,14">
          <animate attributeName="opacity" values="0.8;0;0.8" dur="0.35s" begin="0.2s" repeatCount="indefinite"/>
        </path>
      </g>

      <!-- ===== skateboard ===== -->
      <g id="board">
        <!-- deck -->
        <rect x="-38" y="20" width="80" height="8" rx="4" fill="#3a3a3a"/>
        <rect x="-38" y="20" width="80" height="3" rx="1.5" fill="#5c5c5c"/>
        <!-- trucks -->
        <rect x="-24" y="27" width="6" height="5" fill="#8a8a8a"/>
        <rect x="18" y="27" width="6" height="5" fill="#8a8a8a"/>

        <!-- back wheel -->
        <g transform="translate(-21,35)">
          <g>
            <animateTransform attributeName="transform" type="rotate" values="0;360" dur="0.18s" repeatCount="indefinite"/>
            <circle r="7" fill="#222222"/>
            <circle r="2.4" fill="#9a9a9a"/>
            <line x1="-7" y1="0" x2="7" y2="0" stroke="#555" stroke-width="1"/>
            <line x1="0" y1="-7" x2="0" y2="7" stroke="#555" stroke-width="1"/>
          </g>
        </g>
        <!-- front wheel -->
        <g transform="translate(21,35)">
          <g>
            <animateTransform attributeName="transform" type="rotate" values="0;360" dur="0.18s" repeatCount="indefinite"/>
            <circle r="7" fill="#222222"/>
            <circle r="2.4" fill="#9a9a9a"/>
            <line x1="-7" y1="0" x2="7" y2="0" stroke="#555" stroke-width="1"/>
            <line x1="0" y1="-7" x2="0" y2="7" stroke="#555" stroke-width="1"/>
          </g>
        </g>
      </g>

      <!-- ===== tail (flowing behind, streaked back for speed) ===== -->
      <g transform="translate(-34,4)">
        <g>
          <animateTransform attributeName="transform" type="rotate" values="4 0 0;-6 0 0;4 0 0" dur="0.6s" repeatCount="indefinite"/>
          <path d="M0,0 C-16,2 -30,-2 -40,-10 C-34,-12 -26,-11 -18,-7 C-10,-4 -4,-2 2,-3 Z" fill="#eb9c5e"/>
          <path d="M-38,-9 C-34,-11 -29,-11 -26,-9 C-30,-8 -34,-8 -38,-9 Z" fill="#3a2a20"/>
        </g>
      </g>

      <!-- ===== back leg, bent & braced on deck ===== -->
      <g transform="translate(-16,10)">
        <path d="M0,0 C-3,4 -3,9 1,12 C5,14 11,13 12,9 C9,7 4,4 0,0 Z" fill="#d98a4a"/>
        <ellipse cx="9" cy="12.5" rx="5" ry="3" fill="#fbe3c8"/>
      </g>

      <!-- ===== body, crouched low over board ===== -->
      <path d="M-32,4 C-36,-14 -12,-24 10,-20 C28,-17 38,-8 36,4
               C36,14 22,18 -2,17 C-22,18 -32,14 -32,4 Z" fill="#eb9c5e"/>
      <path d="M-20,4 C-20,12 -8,16 4,15 C14,15 22,11 20,5
               C10,11 -10,11 -20,4 Z" fill="#fbe3c8"/>
      <path d="M-14,-14 C-12,-6 -12,2 -14,8" stroke="#c97a3d" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <path d="M4,-18 C6,-8 6,2 4,10" stroke="#c97a3d" stroke-width="3.5" fill="none" stroke-linecap="round"/>

      <!-- ===== front leg, braced forward on deck ===== -->
      <g transform="translate(20,8)">
        <path d="M0,0 C4,3 6,8 4,12 C1,15 -5,14 -7,10 C-4,7 -2,3 0,0 Z" fill="#eb9c5e"/>
        <ellipse cx="-4" cy="12.5" rx="5" ry="3" fill="#fff6ea"/>
      </g>

      <!-- ===== head, cool & confident, tilted slightly back ===== -->
      <g transform="translate(38,-14) rotate(-8)">
        <!-- ears swept back -->
        <path d="M-13,-8 C-19,-14 -24,-19 -21,-23 C-15,-21 -8,-15 -5,-10 Z" fill="#eb9c5e"/>
        <path d="M6,-11 C10,-19 15,-25 20,-22 C18,-16 12,-11 8,-7 Z" fill="#eb9c5e"/>
        <path d="M-12,-11 C-16,-15 -19,-18 -17,-20 C-13,-18 -9,-14 -7,-11 Z" fill="#f9c9c9"/>
        <path d="M7,-13 C10,-19 13,-22 16,-21 C14,-17 10,-14 8,-11 Z" fill="#f9c9c9"/>

        <!-- head shape -->
        <path d="M-14,0 C-16,-11 -7,-18 3,-18 C14,-18 21,-10 20,0
                 C22,7 17,13 9,15 C3,18 -4,18 -10,15 C-17,13 -19,6 -14,0 Z" fill="#eb9c5e"/>

        <!-- sunglasses -->
        <path d="M-13,-3 C-13,-7 -9,-8.5 -4,-8 C0,-7.5 0,-2 -4,-1 C-9,-0.5 -13,0.5 -13,-3 Z" fill="#1a1a1a"/>
        <path d="M2,-8.5 C7,-9.5 12,-8 12,-3.5 C12,0 8,-0.5 3,-1.5 C-1,-2.3 -1,-7.5 2,-8.5 Z" fill="#1a1a1a"/>
        <rect x="-4" y="-7" width="6" height="2" fill="#1a1a1a"/>
        <path d="M-11,-5.5 L-8,-6.5" stroke="#ffffff" stroke-width="1.1" opacity="0.8" stroke-linecap="round"/>
        <path d="M4,-6.5 L7,-7.3" stroke="#ffffff" stroke-width="1.1" opacity="0.8" stroke-linecap="round"/>

        <!-- smirk -->
        <path d="M-3,6 C0,9 5,9 7,6.5" stroke="#3a2a20" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <path d="M2,6.5 L4.5,4.5 L4.8,7.3 Z" fill="#e8748a"/>

        <!-- whiskers swept back -->
        <path d="M9,3 C15,1.5 20,0.5 25,0" stroke="#ffffff" stroke-width="1" opacity="0.75"/>
        <path d="M9,6 C15,6.5 20,7.5 25,8.5" stroke="#ffffff" stroke-width="1" opacity="0.75"/>
        <path d="M-9,3 C-15,1 -20,-0.5 -24,-2" stroke="#ffffff" stroke-width="1" opacity="0.75"/>
      </g>

    </g>
  </g>
</svg>
