<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <defs>
    <radialGradient id="fireGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb347" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffb347" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

  <!-- night sky bands -->
  <rect x="0" y="0" width="1200" height="26" fill="#050818"/>
  <rect x="0" y="26" width="1200" height="26" fill="#0a0e28"/>
  <rect x="0" y="52" width="1200" height="26" fill="#0f1638"/>
  <rect x="0" y="78" width="1200" height="26" fill="#141d48"/>
  <rect x="0" y="104" width="1200" height="26" fill="#1c2856"/>
  <rect x="0" y="130" width="1200" height="26" fill="#233363"/>

  <!-- stars -->
  <g fill="#eaf2ff">
    <rect x="70" y="16" width="3" height="3"><animate attributeName="opacity" values="1;0.2;1" dur="2.2s" repeatCount="indefinite"/></rect>
    <rect x="150" y="38" width="3" height="3"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" repeatCount="indefinite"/></rect>
    <rect x="250" y="20" width="3" height="3"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></rect>
    <rect x="60" y="60" width="3" height="3"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" repeatCount="indefinite"/></rect>
    <rect x="330" y="55" width="3" height="3"><animate attributeName="opacity" values="1;0.2;1" dur="2.3s" repeatCount="indefinite"/></rect>
    <rect x="450" y="30" width="3" height="3"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/></rect>
    <rect x="950" y="18" width="3" height="3"><animate attributeName="opacity" values="1;0.3;1" dur="2.1s" repeatCount="indefinite"/></rect>
    <rect x="1050" y="45" width="3" height="3"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.7s" repeatCount="indefinite"/></rect>
    <rect x="1140" y="24" width="3" height="3"><animate attributeName="opacity" values="1;0.2;1" dur="2.4s" repeatCount="indefinite"/></rect>
    <rect x="1100" y="65" width="3" height="3"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.9s" repeatCount="indefinite"/></rect>
  </g>

  <!-- moon (pixel circle with craters) -->
  <g fill="#f5eecb">
    <rect x="988" y="24" width="24" height="8"/>
    <rect x="980" y="32" width="40" height="8"/>
    <rect x="976" y="40" width="48" height="8"/>
    <rect x="976" y="48" width="48" height="8"/>
    <rect x="980" y="56" width="40" height="8"/>
    <rect x="988" y="64" width="24" height="8"/>
  </g>
  <g fill="#d9cfa0">
    <rect x="992" y="40" width="6" height="6"/>
    <rect x="1006" y="50" width="5" height="5"/>
  </g>

  <!-- silhouette birds passing the moon -->
  <g fill="#0a0e28">
    <g>
      <rect x="0" y="0" width="10" height="5"><animate attributeName="y" values="0;-8;0" dur="0.5s" calcMode="discrete" repeatCount="indefinite"/></rect>
      <rect x="13" y="0" width="10" height="5"/>
      <rect x="26" y="0" width="10" height="5"><animate attributeName="y" values="0;-8;0" dur="0.5s" calcMode="discrete" repeatCount="indefinite"/></rect>
      <animateTransform attributeName="transform" type="translate" values="850,55; 1150,50" dur="6s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="0" y="0" width="9" height="4"><animate attributeName="y" values="0;-7;0" dur="0.45s" calcMode="discrete" repeatCount="indefinite"/></rect>
      <rect x="12" y="0" width="9" height="4"/>
      <rect x="24" y="0" width="9" height="4"><animate attributeName="y" values="0;-7;0" dur="0.45s" calcMode="discrete" repeatCount="indefinite"/></rect>
      <animateTransform attributeName="transform" type="translate" values="870,72; 1160,65" dur="7s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- far tree line (silhouette) -->
  <g fill="#152036">
    <polygon points="
      0,180 0,150 20,150 20,130 40,130 40,150 60,150 60,120 80,120 80,150
      100,150 100,135 120,135 120,155 140,155 140,125 160,125 160,150
      180,150 180,140 200,140 200,160 220,160 220,130 240,130 240,150
      260,150 260,135 280,135 280,155 300,155 300,125 320,125 320,150
      340,150 340,140 360,140 360,160 380,160 380,130 400,130 400,150
      420,150 420,135 440,135 440,155 460,155 460,125 480,125 480,150
      500,150 500,140 520,140 520,160 540,160 540,130 560,130 560,150
      580,150 580,135 600,135 600,155 620,155 620,125 640,125 640,150
      660,150 660,140 680,140 680,160 700,160 700,130 720,130 720,150
      740,150 740,135 760,135 760,155 780,155 780,125 800,125 800,150
      820,150 820,140 840,140 840,160 860,160 860,130 880,130 880,150
      900,150 900,135 920,135 920,155 940,155 940,125 960,125 960,150
      980,150 980,140 1000,140 1000,160 1020,160 1020,130 1040,130 1040,150
      1060,150 1060,135 1080,135 1080,155 1100,155 1100,125 1120,125 1120,150
      1140,150 1140,140 1160,140 1160,160 1180,160 1180,130 1200,130 1200,180"/>
  </g>

  <!-- near trees (pixel pine trunks + canopies) -->
  <g fill="#0c1424">
    <!-- tree cluster left -->
    <rect x="60" y="200" width="12" height="40"/>
    <polygon points="30,205 100,205 85,180 45,180"/>
    <polygon points="38,185 92,185 80,162 50,162"/>
    <polygon points="46,168 84,168 65,148"/>

    <rect x="160" y="210" width="10" height="30"/>
    <polygon points="135,215 195,215 182,190 148,190"/>
    <polygon points="142,193 188,193 165,172"/>

    <!-- tree cluster right -->
    <rect x="1080" y="205" width="12" height="35"/>
    <polygon points="1050,210 1120,210 1105,185 1065,185"/>
    <polygon points="1058,188 1112,188 1086,165"/>

    <rect x="1160" y="215" width="10" height="25"/>
    <polygon points="1135,220 1195,220 1180,196 1150,196"/>
  </g>

  <!-- ground -->
  <rect x="0" y="230" width="1200" height="30" fill="#0e1a17"/>
  <g stroke="#16261f" stroke-width="1" opacity="0.7">
    <line x1="0" y1="245" x2="1200" y2="245"/>
    <line x1="80" y1="230" x2="80" y2="260"/>
    <line x1="240" y1="230" x2="240" y2="260"/>
    <line x1="400" y1="230" x2="400" y2="260"/>
    <line x1="560" y1="230" x2="560" y2="260"/>
    <line x1="720" y1="230" x2="720" y2="260"/>
    <line x1="880" y1="230" x2="880" y2="260"/>
    <line x1="1040" y1="230" x2="1040" y2="260"/>
    <line x1="1160" y1="230" x2="1160" y2="260"/>
  </g>

  <!-- campfire glow -->
  <circle cx="600" cy="222" r="70" fill="url(#fireGlow)">
    <animate attributeName="r" values="70;80;70" dur="1.6s" repeatCount="indefinite"/>
  </circle>

  <!-- campfire logs -->
  <g fill="#5a3420">
    <rect x="576" y="228" width="48" height="8"/>
    <rect x="580" y="220" width="40" height="8" transform="rotate(-8 600 224)"/>
  </g>

  <!-- campfire flame, discrete flicker frames -->
  <g>
    <polygon fill="#ffcf5c" points="600,180 612,204 588,204">
      <animate attributeName="points"
        values="600,180 612,204 588,204; 600,172 616,206 584,206; 600,180 612,204 588,204; 600,176 610,205 590,205"
        dur="0.5s" calcMode="discrete" repeatCount="indefinite"/>
    </polygon>
    <polygon fill="#ff9a3c" points="600,192 610,214 590,214">
      <animate attributeName="points"
        values="600,192 610,214 590,214; 600,196 614,216 586,216; 600,190 608,213 592,213; 600,194 611,215 589,215"
        dur="0.4s" calcMode="discrete" repeatCount="indefinite"/>
    </polygon>
    <polygon fill="#ff5c33" points="600,206 606,220 594,220">
      <animate attributeName="points"
        values="600,206 606,220 594,220; 600,204 608,220 592,220; 600,208 605,220 595,220; 600,205 607,220 593,220"
        dur="0.35s" calcMode="discrete" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- rising embers -->
  <g fill="#ffb347">
    <rect x="596" y="180" width="3" height="3">
      <animate attributeName="y" values="200;120" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="2.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="606" y="185" width="2.5" height="2.5">
      <animate attributeName="y" values="205;130" dur="1.8s" begin="0.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="1.8s" begin="0.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="590" y="188" width="2.5" height="2.5">
      <animate attributeName="y" values="208;140" dur="2s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="2s" begin="0.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="600" y="182" width="3" height="3">
      <animate attributeName="y" values="200;125" dur="2.4s" begin="1.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="2.4s" begin="1.3s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- fireflies -->
  <g fill="#c6ff5e" filter="url(#softGlow)">
    <circle r="2.5">
      <animateMotion path="M300,190 C330,150 360,210 320,170 C290,150 350,140 300,190" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.2">
      <animateMotion path="M850,170 C880,140 900,190 860,160 C830,150 870,120 850,170" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.2;1" dur="1.9s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.3">
      <animateMotion path="M180,200 C210,175 230,215 195,190 C170,180 220,160 180,200" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="2">
      <animateMotion path="M700,205 C725,185 745,220 710,200 C690,190 730,175 700,205" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.3;1" dur="1.7s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.4">
      <animateMotion path="M470,195 C495,170 515,210 480,185 C455,175 500,160 470,195" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- glowing mantra text in the sky -->
  <text x="600" y="100" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="20" font-weight="700" fill="#eaf2ff" filter="url(#softGlow)" letter-spacing="2">
    still debugging, still dreaming
    <animate attributeName="opacity" values="0.55;1;0.55" dur="3.2s" repeatCount="indefinite"/>
  </text>
  <text x="600" y="100" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="20" font-weight="700" fill="#eaf2ff" letter-spacing="2" opacity="0.9">
    still debugging, still dreaming
  </text>

  <!-- pixel-frame border -->
  <rect x="0" y="0" width="1200" height="7" fill="#0a0e1a"/>
  <rect x="0" y="253" width="1200" height="7" fill="#0a0e1a"/>
  <rect x="0" y="0" width="7" height="260" fill="#0a0e1a"/>
  <rect x="1193" y="0" width="7" height="260" fill="#0a0e1a"/>
</svg>
